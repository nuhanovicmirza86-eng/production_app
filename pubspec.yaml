name: production_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.2.0
  shared_preferences: ^2.2.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  flutter_launcher_icons: ^0.14.4
  file_picker: ^8.1.2
  excel: ^4.0.6
  share_plus: ^10.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf
    - branding/operonix_production_icon.PNG

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "branding/operonix_production_icon.PNG"
  adaptive_icon_background: "#164344"
  adaptive_icon_foreground: "branding/operonix_production_icon.PNG"